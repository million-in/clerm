name: ci

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - 'v*'
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./tests/... -count=1

      - name: Build clerm
        run: |
          mkdir -p bin
          go build -o bin/clerm ./cmd/clerm
