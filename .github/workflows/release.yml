name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -count=1

      - name: Run race tests
        run: go test -race ./tests/... -count=1

  build:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: tar.gz
          - goos: linux
            goarch: arm64
            ext: tar.gz
          - goos: darwin
            goarch: amd64
            ext: tar.gz
          - goos: darwin
            goarch: arm64
            ext: tar.gz
          - goos: windows
            goarch: amd64
            ext: zip
          - goos: windows
            goarch: arm64
            ext: zip
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release artifact
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          mkdir -p dist
          version="${GITHUB_REF_NAME:-dev}"
          base="clerm_${version}_${GOOS}_${GOARCH}"
          outdir="dist/${base}"
          mkdir -p "$outdir"
          binary="clerm"
          if [ "$GOOS" = "windows" ]; then
            binary="clerm.exe"
          fi
          go build -trimpath -ldflags="-s -w" -o "$outdir/$binary" ./cmd/clerm
          cp README.md "$outdir/README.md"
          if [ "${{ matrix.ext }}" = "zip" ]; then
            (cd dist && zip -r "${base}.zip" "$base")
          else
            tar -C dist -czf "dist/${base}.tar.gz" "$base"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS.txt
